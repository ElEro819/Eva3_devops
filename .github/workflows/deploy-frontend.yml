name: Deploy Frontend

on:
  push:
    branches:
      - deploy
    paths:
      - 'front_despacho/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Frontend
        run: |
          docker build -t $IMAGE_NAME ./front_despacho

      - name: Publicar imagen Frontend en Docker Hub
        run: |
          docker push $IMAGE_NAME

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Desplegar Frontend en EC2 Front usando SSM
        env:
          EC2_FRONT_INSTANCE_ID: ${{ secrets.EC2_FRONT_INSTANCE_ID }}
        run: |
          cat > ssm-params.json <<EOF
          {
            "commands": [
              "sudo docker pull $IMAGE_NAME",
              "sudo docker stop frontend-app || true",
              "sudo docker rm frontend-app || true",
              "sudo docker run -d --name frontend-app --restart always -p 80:8080 $IMAGE_NAME",
              "sudo docker ps",
              "for i in 1 2 3 4 5 6; do if curl -fsS http://localhost; then exit 0; fi; echo 'Esperando que Frontend inicie...'; sleep 5; done; sudo docker logs frontend-app --tail 80; exit 1"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_FRONT_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Frontend" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          sleep 10

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_FRONT_INSTANCE_ID" || true

          echo "===== STDOUT ====="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_FRONT_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          echo "===== STDERR ====="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_FRONT_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_FRONT_INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "El comando SSM falló con estado: $STATUS"
            exit 1
          fi